services:
  - type: web
    name: aegis-backend
    runtime: python
    plan: free
    buildCommand: pip install -r requirements.txt
    startCommand: gunicorn -w 4 -k uvicorn.workers.UvicornWorker api.server:app
    envVars:
      - key: PYTHON_VERSION
        value: latest
      - key: ALLOWED_ORIGINS
        fromDatabase:
          name: frontend_url
      - key: PORT
        value: 8000
